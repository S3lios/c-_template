name: CI

on:
  push:
    branches:
      - master
      - develop

  pull_request:
    branches:
      - master
      - develop

env:
  BUILD_PRESET: ci

jobs:
  build-debug:
    name: Debug build

    runs-on: ubuntu-latest
    container:
      image: gcc:15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          apt update
          apt install -y \
            libgtest-dev
            cmake

      - name: Configure
        run: |
          cmake --preset debug

      - name: Build
        run: |
          cmake --build --preset debug

  tests:
    name: Tests

    runs-on: ubuntu-latest
    container:
      image: gcc:15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          apt update
          apt install -y \
            cmake \
            libgtest-dev

      - name: Configure
        run: |
          cmake --preset test

      - name: Build
        run: |
          cmake --build --preset test

      - name: Run tests
        run: |
          ctest --preset test

  documentation:
    name: Documentation

    runs-on: ubuntu-latest
    container:
      image: gcc:15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tools
        run: |
          apt update
          apt install -y \
            cmake \
            doxygen \
            graphviz \
            texlive-latex-extra \
            texlive-pictures

      - name: Configure
        run: |
          cmake --preset docs

      - name: Build documentation
        run: |
          cmake --build --preset docs --target doc

      - name: Upload docs
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: build/docs

  release-build:
    name: Release build

    runs-on: ubuntu-latest
    container:
      image: gcc:15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tools
        run: |
          apt update
          apt install -y \
            cmake \
            doxygen \
            graphviz \
            texlive-latex-extra \
            texlive-pictures

      - name: Configure
        run: |
          cmake --preset release

      - name: Build
        run: |
          cmake --build --preset release

  commit-check:
    name: Commit convention

    runs-on: ubuntu-latest
    container:
      image: gcc:15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          apt update
          apt install -y \
            cmake \
            python3 \
            pipx
          pipx install commitizen

      - name: Add pipx to PATH
        run: echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Configure git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Check commits
        shell: bash
        run: |
          if [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
            cz check --rev-range "${{ github.sha }}"
          else
            cz check --rev-range "${{ github.event.before }}..${{ github.sha }}"
          fi

  clang-format:
    name: Code format check

    runs-on: ubuntu-latest
    container:
      image: gcc:15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          apt update
          apt install -y clang-format

      - name: Check formatting
        run: |
          clang-format \
            --dry-run \
            --Werror \
            $(find . \
              \( -name "*.cpp" \
              -o -name "*.hpp" \
              -o -name "*.h" \) \
              -not -path "./build/*")

  clang-tidy:
    name: Static analysis

    runs-on: ubuntu-latest
    container:
      image: gcc:15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          apt update
          apt install -y \
            cmake \
            clang-tidy \
            libgtest-dev

      - name: Configure
        run: |
          cmake --preset debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build compile database
        run: |
          cmake --build --preset debug

      - name: Run clang-tidy
        run: |
          clang-tidy \
            $(find src tests \
              \( -name "*.cpp" \)) \
            -p build/debug