name: CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop


env:
  BUILD_PRESET: ci


jobs:

  build-debug:

    name: Debug build

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            cmake


      - name: Configure
        run: |
          cmake --preset debug


      - name: Build
        run: |
          cmake --build --preset debug



  tests:

    name: Tests

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            cmake \
            libgtest-dev


      - name: Configure
        run: |
          cmake --preset test


      - name: Build
        run: |
          cmake --build --preset test


      - name: Run tests
        run: |
          ctest --preset test



  documentation:

    name: Documentation

    runs-on: ubuntu-latest


    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y \
            cmake \
            doxygen \
            graphviz \
            texlive-latex-extra

      - name: Configure
        run: |
          cmake --preset docs

      - name: Build documentation
        run: |
          cmake --build --preset docs --target doc

      - name: Upload docs
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: build/docs

  release-build:

    name: Release build

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            cmake \


      - name: Configure
        run: |
          cmake --preset release


      - name: Build
        run: |
          cmake --build --preset release